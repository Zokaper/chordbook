kind = "mobile"
previewPath = "/"
title = "Songbook"
version = "1.0.0"
id = "artifacts/songbook"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20499

[services.development]
run = "pnpm --filter @workspace/songbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/songbook", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/songbook", "run", "serve" ]

[services.env]
PORT = "20499"
BASE_PATH = "/"
