<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <meta name="description" content="A private, build-first personal songbook for guitarists." />
    <meta name="theme-color" content="#faf6f2" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141010" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chordbook" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <script>
      const isLocalhost = ["localhost", "127.0.0.1", "::1"].includes(location.hostname);
      if ("serviceWorker" in navigator && !isLocalhost) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function (error) {
            console.warn("Service worker registration failed", error);
          });
        });
      }
    </script>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        background-color: #faf6f2;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #141010;
        }
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
